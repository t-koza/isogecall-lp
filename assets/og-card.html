<!doctype html>
<html lang="ja"><head><meta charset="utf-8" />
<style>
  *{margin:0;box-sizing:border-box;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;}
  body{width:1200px;height:630px;overflow:hidden;}
  .card{width:1200px;height:630px;position:relative;
    background:linear-gradient(150deg,#14463f 0%,#0e302b 100%);color:#fff;
    padding:72px 80px;display:flex;flex-direction:column;justify-content:center;}
  .badge{display:inline-block;align-self:flex-start;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);color:#cdeae5;font-weight:700;font-size:24px;
    padding:10px 26px;border-radius:999px;margin-bottom:34px;letter-spacing:.02em;}
  h1{font-size:78px;font-weight:900;line-height:1.28;letter-spacing:.01em;}
  h1 .o{color:#ffb86b;}
  p{margin-top:30px;font-size:30px;color:#dbe7e4;font-weight:500;}
  .brand{position:absolute;right:70px;bottom:56px;display:flex;align-items:center;gap:18px;}
  .brand img{width:96px;height:96px;border-radius:50%;}
  .brand b{font-size:36px;font-weight:900;color:#fff;}
  .kpis{position:absolute;left:80px;bottom:56px;display:flex;gap:40px;}
  .kpis div{display:flex;flex-direction:column;}
  .kpis span{font-size:20px;color:#9fc4bd;}
  .kpis b{font-size:44px;color:#ffb86b;font-weight:900;line-height:1;}
</style></head>
<body>
  <div class="card">
    <span class="badge">賃貸仲介専門｜反響対応・追客代行</span>
    <h1>夜間も定休日も、<br><span class="o">反響にすぐ架電。</span></h1>
    <p>来店率を伸ばす反響対応代行「イソゲコール」</p>
    <div class="kpis">
      <div><span>通電率</span><b>58%</b></div>
      <div><span>対応反響アポ率</span><b>41%</b></div>
      <div><span>導入2ヶ月で成約</span><b>1.5倍</b></div>
    </div>
    <div class="brand"><img src="logo-round.png" alt=""><b>イソゲコール</b></div>
  </div>
</body></html>
